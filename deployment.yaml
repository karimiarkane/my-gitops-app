apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-custom-app
  labels:
    app: my-custom-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: my-custom-app
  template:
    metadata:
      labels:
        app: my-custom-app
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: app-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>My First GitOps App</title>
        <style>
            body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding-top: 50px; }
            h1 { color: #333; }
        </style>
    </head>
    <body>
        <h1>Hello Abdelkarim!</h1>
        <p>This application was deployed completely via GitOps and Helm/ArgoCD.</p>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: my-custom-app-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: my-custom-app
